<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Four Card Feature</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <section class="container">
    <h1>Reliable, efficient delivery</h1>
    <p class="subtitle">Powered by Technology</p>

    <div class="cards">

      <div class="card card1">
        <h3>Supervisor</h3>
        <p>Monitors activity to identify project roadblocks</p>
      </div>

      <div class="card card2">
        <h3>Team Builder</h3>
        <p>Scans talent network to create the optimal team</p>
      </div>

      <div class="card card3">
        <h3>Karma</h3>
        <p>Regularly evaluates talent to ensure quality</p>
      </div>

      <div class="card card4">
        <h3>Calculator</h3>
        <p>Uses data from past projects to provide better estimates</p>
      </div>

    </div>
  </section>

</body>
</html>
