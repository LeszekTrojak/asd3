<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Four Card Feature</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <header class="header">
      <h1>Reliable, efficient delivery</h1>
      <p>Powered by Technology</p>
    </header>

    <section class="cards">

      <div class="card card--cyan">
        <h3>Supervisor</h3>
        <p>Monitors activity to identify project roadblocks</p>
      </div>

      <div class="card card--red">
        <h3>Team Builder</h3>
        <p>Scans talent network to create the optimal team</p>
      </div>

      <div class="card card--orange">
        <h3>Karma</h3>
        <p>Regularly evaluates talent to ensure quality</p>
      </div>

      <div class="card card--blue">
        <h3>Calculator</h3>
        <p>Uses data from past projects to provide better estimates</p>
      </div>

    </section>

  </main>

</body>
</html>
